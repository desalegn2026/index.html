<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri Farm | Smart Agriculture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f7f8fa; font-family: sans-serif; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 448px; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-item { text-align: center; color: #999; font-size: 12px; }
        .nav-item.active { color: #16a34a; }
        .card-grad { background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%); }
    </style>
</head>
<body class="max-w-md mx-auto shadow-2xl min-h-screen relative bg-white">

    <div id="registerSection" class="block">
        <div class="bg-green-600 p-6 text-white flex items-center gap-4">
            <i class="fas fa-chevron-left"></i>
            <h1 class="text-lg font-bold">Register Account</h1>
        </div>

        <div class="mt-4 px-2">
            <div class="flex items-center px-4 py-4 border-b">
                <i class="fas fa-mobile-alt text-gray-400 w-8"></i>
                <span class="text-gray-600 mr-2">+251</span>
                <input type="number" id="regPhone" placeholder="Please enter phone number" class="w-full outline-none text-sm">
            </div>

            <div class="flex items-center px-4 py-4 border-b">
                <i class="fas fa-lock text-gray-400 w-8"></i>
                <input type="password" id="regPass" placeholder="Please enter password" class="w-full outline-none text-sm">
            </div>

            <div class="flex items-center px-4 py-4 border-b">
                <i class="fas fa-user-plus text-gray-400 w-8"></i>
                <input type="text" id="refField" placeholder="Invitation code" class="w-full outline-none text-sm text-orange-500 font-bold">
            </div>

            <div class="p-6">
                <button onclick="goToDashboard()" class="w-full bg-green-600 text-white py-3 rounded-full font-bold shadow-lg uppercase">
                    Register Now
                </button>
            </div>
        </div>
    </div>

    <div id="dashboardSection" class="hidden">
        <div class="card-grad p-8 text-white rounded-b-[3rem] shadow-xl">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center border-2 border-white/30">
                    <i class="fas fa-user text-2xl"></i>
                </div>
                <div>
                    <p id="displayPhone" class="font-bold text-lg">0912345678</p>
                    <span class="bg-yellow-400 text-green-900 text-[10px] px-2 py-0.5 rounded-full font-bold">VIP 0</span>
                </div>
            </div>
            
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-xs opacity-80 uppercase tracking-widest">Total Assets (ETB)</p>
                    <h2 class="text-4xl font-black mt-1">0.00</h2>
                </div>
                <button class="bg-white text-green-600 px-4 py-1.5 rounded-full text-xs font-bold shadow-md">Withdraw</button>
            </div>
        </div>

        <div class="mx-4 mt-6">
            <a href="#" class="bg-blue-50 border border-blue-100 p-4 rounded-2xl flex items-center justify-between shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-500 text-white w-10 h-10 rounded-full flex items-center justify-center">
                        <i class="fab fa-telegram-plane"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-blue-900 text-sm">Official Telegram</h4>
                        <p class="text-[10px] text-green-600 font-bold"><i class="fas fa-circle text-[6px] animate-pulse"></i> 128,452 Subscribers</p>
                    </div>
                </div>
                <i class="fas fa-external-link-alt text-blue-300 text-xs"></i>
            </a>
        </div>

        <div class="grid grid-cols-4 gap-2 p-6">
            <div class="text-center">
                <div class="bg-orange-100 text-orange-600 w-12 h-12 rounded-2xl flex items-center justify-center mx-auto mb-2 shadow-sm"><i class="fas fa-hand-holding-usd text-xl"></i></div>
                <p class="text-[10px] font-bold text-gray-600">Deposit</p>
            </div>
            <div class="text-center">
                <div class="bg-blue-100 text-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center mx-auto mb-2 shadow-sm"><i class="fas fa-users text-xl"></i></div>
                <p class="text-[10px] font-bold text-gray-600">Team</p>
            </div>
            <div class="text-center">
                <div class="bg-purple-100 text-purple-600 w-12 h-12 rounded-2xl flex items-center justify-center mx-auto mb-2 shadow-sm"><i class="fas fa-gift text-xl"></i></div>
                <p class="text-[10px] font-bold text-gray-600">Bonus</p>
            </div>
            <div class="text-center">
                <div class="bg-pink-100 text-pink-600 w-12 h-12 rounded-2xl flex items-center justify-center mx-auto mb-2 shadow-sm"><i class="fas fa-headset text-xl"></i></div>
                <p class="text-[10px] font-bold text-gray-600">Support</p>
            </div>
        </div>

        <div class="px-6 pb-24">
            <h3 class="text-sm font-bold text-gray-800 mb-3 uppercase tracking-wider">Live Withdrawals</h3>
            <div class="bg-gray-50 rounded-2xl p-4 space-y-4 border border-gray-100">
                <div class="flex justify-between items-center text-[11px] border-b pb-2 border-gray-200">
                    <span class="text-gray-500">User 091***45</span>
                    <span class="text-green-600 font-bold">+4,500.00 ETB</span>
                    <span class="text-gray-400 italic">2 mins ago</span>
                </div>
                <div class="flex justify-between items-center text-[11px] border-b pb-2 border-gray-200">
                    <span class="text-gray-500">User 094***12</span>
                    <span class="text-green-600 font-bold">+1,200.00 ETB</span>
                    <span class="text-gray-400 italic">5 mins ago</span>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active"><i class="fas fa-home text-lg"></i><p>Home</p></div>
            <div class="nav-item"><i class="fas fa-leaf text-lg"></i><p>Task</p></div>
            <div class="nav-item"><i class="fas fa-users text-lg"></i><p>Team</p></div>
            <div class="nav-item"><i class="fas fa-user text-lg"></i><p>Mine</p></div>
        </div>
    </div>

    <script>
        // 1. የሪፈራል ኮዱን ከሊንኩ ማንበቢያ
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            if (ref) {
                document.getElementById('refField').value = ref;
            }
        }

        // 2. ወደ ዳሽቦርድ መግቢያ
        function goToDashboard() {
            const phone = document.getElementById('regPhone').value;
            const pass = document.getElementById('regPass').value;

            if (phone.length >= 9 && pass !== "") {
                document.getElementById('registerSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('displayPhone').innerText = "0" + phone;
            } else {
                alert("Please enter valid phone and password!");
            }
        }
    </script>
</body>
</html>
